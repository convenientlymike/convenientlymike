<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="6" viewBox="0 0 1000 6" preserveAspectRatio="none" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-260 0" to="1000 0" dur="3.4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="6" rx="3" fill="url(#base)"/>
  <rect x="0" y="0" width="1000" height="6" rx="3" fill="url(#shine)"/>
</svg>
