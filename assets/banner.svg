<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Michael, @convenientlymike — software, systems and AI engineer. From the kernel to the cloud, I build all of it.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090F"/>
      <stop offset="1" stop-color="#120E22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="name" x1="66" y1="120" x2="520" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C7BFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>
  <ellipse cx="1040" cy="160" rx="380" ry="270" fill="url(#glow)"/>
  <rect width="7" height="320" fill="url(#accent)"/>

  <!-- identity block -->
  <text x="68" y="98" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="15" letter-spacing="4.5" fill="#8B5CF6" font-weight="600">SOFTWARE · SYSTEMS · AI</text>
  <text x="64" y="170" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="64" font-weight="800" fill="url(#name)">Michael</text>
  <text x="70" y="208" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="19" fill="#9CA3AF">@convenientlymike</text>
  <text x="69" y="252" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19" fill="#CBD5E1">From the kernel to the cloud — I build all of it.</text>

  <!-- layer-stack motif: every layer, connected -->
  <line x1="916" y1="76" x2="916" y2="244" stroke="#8B5CF6" stroke-opacity="0.55" stroke-width="2.5"/>

  <g font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="14" font-weight="600">
    <rect x="900" y="61" width="300" height="30" rx="15" fill="#22D3EE" fill-opacity="0.16" stroke="#22D3EE" stroke-opacity="0.75" stroke-width="1.25"/>
    <circle cx="916" cy="76" r="5.5" fill="#22D3EE"/>
    <text x="938" y="81" fill="#F1F5F9">CLOUD</text>

    <rect x="900" y="103" width="300" height="30" rx="15" fill="#A78BFA" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.75" stroke-width="1.25"/>
    <circle cx="916" cy="118" r="5.5" fill="#A78BFA"/>
    <text x="938" y="123" fill="#F1F5F9">AI · AUTOMATION</text>

    <rect x="900" y="145" width="300" height="30" rx="15" fill="#8B5CF6" fill-opacity="0.16" stroke="#8B5CF6" stroke-opacity="0.75" stroke-width="1.25"/>
    <circle cx="916" cy="160" r="5.5" fill="#8B5CF6"/>
    <text x="938" y="165" fill="#F1F5F9">BACKEND · SaaS</text>

    <rect x="900" y="187" width="300" height="30" rx="15" fill="#818CF8" fill-opacity="0.16" stroke="#818CF8" stroke-opacity="0.75" stroke-width="1.25"/>
    <circle cx="916" cy="202" r="5.5" fill="#818CF8"/>
    <text x="938" y="207" fill="#F1F5F9">SYSTEMS · REVERSE ENG</text>

    <rect x="900" y="229" width="300" height="30" rx="15" fill="#6366F1" fill-opacity="0.16" stroke="#6366F1" stroke-opacity="0.75" stroke-width="1.25"/>
    <circle cx="916" cy="244" r="5.5" fill="#6366F1"/>
    <text x="938" y="249" fill="#F1F5F9">KERNEL</text>
  </g>
</svg>
