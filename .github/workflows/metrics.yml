# Auto-updating profile metrics — lowlighter/metrics
# Renders an SVG IN your own Action runner and commits it to the repo, so it
# never depends on a rate-limited public endpoint (the failure mode of the
# shared github-readme-stats host). It can also surface PRIVATE contribution
# counts, which matters since your repos are private today.
#
# ONE-TIME SETUP:
#   1. Create a classic Personal Access Token (https://github.com/settings/tokens)
#      with scopes: repo, read:user, read:org   → copy it.
#   2. Repo → Settings → Secrets and variables → Actions → New secret
#      Name: METRICS_TOKEN   Value: <the PAT>
#   3. Repo → Settings → Actions → General → Workflow permissions →
#      "Read and write permissions".
#   4. Run it once: Actions tab → "Profile metrics" → Run workflow.
#   5. Embed the result in README.md:  <img src="assets/metrics.png" width="100%" alt="metrics" />
#      PNG (not SVG) so it renders identically on iOS Safari / in-app webviews.
name: Profile metrics
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (we rasterize the SVG to a hi-res PNG + commit ourselves)
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: convenientlymike
          # Generate the SVG (uncommitted); the next step rasterizes it to a
          # high-res transparent PNG. We ship a PNG because the SVG used a
          # <foreignObject>, which iOS Safari (and iOS in-app webviews) mis-size
          # — they let the card overflow its canvas and clip the right column on
          # iPhone. A raster renders identically on every engine. We render it at
          # 3x device-scale-factor so it stays crisp on Retina displays too.
          filename: assets/metrics.svg
          config_output: svg
          template: classic
          base: ""
          config_timezone: America/Denver        # MST / Mountain Time
          config_order: languages, isocalendar
          config_display: regular
          # ANONYMITY: both plugins are AGGREGATE-ONLY — they count private work
          # (language bytes, calendar heat) but never render a repository NAME.
          # base: "" already drops the repo/activity sections. Do NOT add per-repo
          # plugins (lines/activity/notable/stars/code/repositories) or _indepth, and
          # never put a repo name / banned token in this PUBLIC file. Verify each
          # render LOCALLY (render the SVG + grep for leaks) before pushing.
          # REMOVED habits + achievements: both error on this account's data (habits
          # "Cannot destructure author of undefined"; achievements GraphQL error) and
          # only render red "Unexpected error" blocks. languages + isocalendar are clean.
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: false

          # Languages — granular aggregate breakdown (% + byte sizes; no repo names)
          # indepth: per-commit attribution de-vendors the byte counts (so TypeScript
          # stops drowning out Rust/Python/Swift) AND yields the real total bytes/files.
          # Safe here: phantom is not on GitHub, so the token can't clone it; output is
          # name-free. limit:0 + threshold:0 = show EVERY language.
          plugin_languages: yes
          # Lifetime repo-byte mode (NOT indepth): shows EVERY language across all
          # repos with real file sizes — the full polyglot breadth (Rust/Swift/Go/C/
          # Kotlin included). indepth only saw ~5 recent (Python/TS) languages, so it
          # can't represent the systems work. Trade-off: TypeScript leads by byte volume.
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_categories: programming, markup
          plugin_languages_limit: 0
          plugin_languages_threshold: 0%
          plugin_languages_colors: github

          # Isometric 3D contribution calendar (recolored to the brand ramp via CSS below)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # ---- Dark violet→cyan restyle ----
          # Only renderer-safe CSS: solid colors + direct fill-overrides. The earlier
          # gradient-text headers, :root calendar vars, drop-shadow and CSS animation
          # did NOT render in the committed SVG, so they're dropped. The calendar uses
          # inline fill="#9be9a8" etc. (GitHub greens), so we override those fills.
          extras_css: |
            .items-wrapper{position:relative;background:
              radial-gradient(120% 120% at 0% 0%,rgba(139,92,246,.16),transparent 55%),
              radial-gradient(120% 120% at 100% 100%,rgba(34,211,238,.14),transparent 55%),
              #0D1117;
              border:1px solid #21262D;border-radius:12px;padding:14px 18px;}
            body{margin:0;}
            svg{color:#E6EDF3;}
            h2,h3{color:#A78BFA;font-weight:700;}
            h2 svg,h3 svg{fill:#8B5CF6;}
            .field{color:#C9D1D9;}
            .field svg{fill:#22D3EE;}
            svg.bar rect[fill="white"]{fill:#161B22;}
            /* make the language bar POP: taller + saturated/brighter + soft violet glow */
            svg.bar{height:14px;filter:saturate(1.55) brightness(1.32) drop-shadow(0 0 3px rgba(139,92,246,.5));}
            svg.bar rect{height:14px;}
            .field.language svg path{filter:saturate(1.5) brightness(1.32);}
            [fill="#ebedf0"]{fill:#161B22;}
            [fill="#9be9a8"]{fill:#312E81;}
            [fill="#40c463"]{fill:#6366F1;}
            [fill="#30a14e"]{fill:#8B5CF6;}
            [fill="#216e39"]{fill:#22D3EE;}
          output_action: none

      - name: Rasterize SVG -> high-res transparent PNG (3x — crisp on every display)
        run: |
          echo "=== assets/ after metrics ==="; ls -la assets/ 2>/dev/null || true
          SVG="$PWD/assets/metrics.svg"
          if [ ! -f "$SVG" ]; then
            echo "not at assets/metrics.svg — searching workspace..."
            SVG="$(find "$PWD" -name 'metrics*.svg' 2>/dev/null | head -1)"
          fi
          if [ -z "$SVG" ] || [ ! -f "$SVG" ]; then
            echo "ERROR: metrics produced no SVG in the workspace. All .svg files:"
            find "$PWD" -name '*.svg' 2>/dev/null | head -20
            exit 1
          fi
          echo "found SVG: $SVG"
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium)"
          echo "using: $CHROME"; "$CHROME" --version
          W=$(grep -oE '<svg[^>]*>' "$SVG" | head -1 | grep -oE 'width="[0-9]+"' | head -1 | grep -oE '[0-9]+')
          H=$(grep -oE '<svg[^>]*>' "$SVG" | head -1 | grep -oE 'height="[0-9]+"' | head -1 | grep -oE '[0-9]+')
          echo "svg ${W}x${H} -> png at 3x"
          "$CHROME" --headless=new --disable-gpu --no-sandbox --hide-scrollbars \
            --default-background-color=00000000 --force-device-scale-factor=3 \
            --window-size=${W},${H} --screenshot="$PWD/assets/metrics.png" \
            "file://$SVG"
          # assert the PNG is RGBA (color type 6) so transparency wasn't lost
          python3 -c "import struct,sys; d=open('assets/metrics.png','rb').read(26); w,h=struct.unpack('>II',d[16:24]); assert d[25]==6, f'PNG color type {d[25]} != 6 (RGBA); transparency lost'; print(f'png {w}x{h} RGBA ok')"
          ls -la assets/metrics.png

      - name: Commit & push
        run: |
          rm -f assets/metrics.svg
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.png
          if git diff --cached --quiet; then
            echo "no metrics change"
          else
            git commit -m "chore: refresh profile metrics"
            git push
          fi
